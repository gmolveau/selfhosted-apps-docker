version: "3.5"

services:
  profilarr:
    container_name: profilarr
    # image: santiagosayshey/profilarr:v1.1.4@sha256:96cc212c1ef9970d86b3ec95627795ddc447f6a99c3597d2eeba8193f1bfbd29
    image: profilarr:local
    # NOTE: dockerhub image does not work, had to rebuild it locally
    # git clone https://github.com/Dictionarry-Hub/profilarr.git
    # docker build -t profilarr:local .
    cpu_count: 4
    mem_limit: 2G
    memswap_limit: 2G
    read_only: true
    cap_drop:
      - ALL
    user: ${PUID:?}:${PGID:?}
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${PUID:?},gid=${PGID:?}
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:6868/api/v1/health
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s
    volumes:
      - ./volumes/config:/config
    environment:
      # General
      - TZ=Europe/Paris
      - PUID=${PUID:?}
      - PGID=${PGID:?}
      # NGINX + LETSENCRYPT
      - VIRTUAL_PORT=6868
      - VIRTUAL_HOST=${APP_DOMAIN:?}
      - LETSENCRYPT_HOST=${APP_DOMAIN:?}
    networks:
      - proxy
      - arr

networks:
  proxy:
    external: true
  arr:
    external: true
