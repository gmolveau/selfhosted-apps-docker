version: "3.5"

services:
  transmission:
    container_name: transmission
    image: linuxserver/transmission:4.1.1
    restart: always
    environment:
      # General
      - TZ=Europe/Paris
      - PUID=${PUID:-1000}
      - PGID=${PUID:-1000}
      # NGINX + LETSENCRYPT
      - VIRTUAL_PORT=9091
      - VIRTUAL_HOST=${APP_DOMAIN}
      - LETSENCRYPT_HOST=${APP_DOMAIN}
      # APP
      - TRANSMISSION_WEB_HOME=${TRANSMISSION_WEB_HOME}
      - USER=${WEBUI_USER}
      - PASS=${WEBUI_PASS}
      # VPN
      - http_proxy=http://gluetun:8888
      - https_proxy=http://gluetun:8888
      - no_proxy=prowlarr,flaresolverr,sonarr,radarr,lidarr,bazarr,unpackerr,localhost,127.0.0.1
    volumes:
      - ~/files/downloads:/downloads/complete
      - ./volumes/config:/config
      - ./volumes/incomplete:/downloads/incomplete
    networks:
      - proxy
      - vpn
      - arr

networks:
  proxy:
    external: true
  vpn:
    external: true
  arr:
    external: true
